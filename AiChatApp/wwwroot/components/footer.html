<footer id="global-footer" class="fixed bottom-0 left-0 right-0 md:left-[260px] p-4 md:p-6 bg-gradient-to-t from-base-100 via-base-100 to-transparent z-[100] pointer-events-none" style="display:none">
    <div class="max-w-3xl mx-auto relative pointer-events-auto">
        <form id="chat-form" onsubmit="return handleFormSubmit(event)" class="input-container relative bg-base-200 rounded-[24px] shadow-2xl border border-base-300 transition-all focus-within:border-primary/50 flex flex-col p-2">
            <div id="project-context-banner" class="hidden flex items-center justify-between px-3 py-1.5 bg-secondary/10 border-b border-secondary/20 rounded-t-[20px] -mb-1 mx-0.5"><div class="flex items-center gap-1.5"><span class="text-[11px] font-semibold text-secondary opacity-80" id="project-banner-name"></span></div><button type="button" onclick="deselectProject()" class="text-[10px] opacity-40 hover:opacity-70 transition-opacity">✕ clear</button></div>
            <input type="hidden" name="sessionId" id="session-id-input" /><input type="hidden" name="projectId" id="project-id-input" /><input type="hidden" name="agentId" id="selected-agent-id-input" />
            <div id="provider-selector-container" class="flex items-center justify-between px-3 pt-1 pb-1 border-b border-base-content/5 mb-1">
                <select name="provider" onchange="changeSessionProvider(this.value)" class="select select-ghost select-xs opacity-60 font-semibold"><option value="gemini" selected>Gemini</option><option value="gh-copilot">GitHub Copilot</option><option value="claude">Claude Code</option><option value="codex">Codex</option></select>
                <input type="hidden" name="mode" id="mode-input" value="" />
            </div>
            <div id="project-agent-selector" class="flex items-center gap-2 px-3 py-1.5 overflow-x-auto no-scrollbar border-b border-base-content/5 hidden"><span class="text-[9px] font-bold opacity-30 uppercase">Agent:</span><div id="project-agent-chips" class="flex items-center gap-1.5"></div></div>
            <div class="flex items-end gap-2 w-full">
                <button type="button" onclick="document.getElementById('history-modal').showModal(); htmx.trigger('body', 'refreshHistory')" class="btn btn-ghost btn-sm btn-circle mb-1 opacity-60 hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                </button>
                <textarea name="content" id="chat-input" data-i18n="input-placeholder" class="textarea textarea-ghost focus:bg-transparent focus:outline-none w-full py-3 leading-relaxed text-base min-h-[44px]" required autocomplete="off" oninput="autoExpand(this)" onkeydown="if(event.ctrlKey&&event.keyCode==13)handleFormSubmit(event)"></textarea><button type="submit" class="btn btn-circle btn-primary btn-sm md:btn-md shadow-lg" id="send-btn"><span id="loading-spinner" class="loading loading-spinner loading-xs hidden"></span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg></button></div>
        </form>
    </div>
</footer>
