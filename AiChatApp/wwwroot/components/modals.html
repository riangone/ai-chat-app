<div id="modal-container">
    <dialog id="agent_modal" class="modal"><div class="modal-box w-11/12 max-w-2xl"><h3 class="font-bold text-lg" data-i18n="agent-roles-title">Project Agents</h3><div id="agent-list" class="mt-4 space-y-2 max-h-52 overflow-y-auto"></div><div class="mt-4 p-4 bg-base-200 rounded-lg space-y-3"><div class="flex items-center justify-between"><span class="text-xs font-bold uppercase opacity-40">Add Role</span><div class="dropdown dropdown-end"><div tabindex="0" role="button" class="btn btn-xs btn-outline">Presets</div><ul tabindex="0" id="preset-dropdown" class="dropdown-content z-[100] menu p-2 shadow bg-base-300 rounded-box w-64 text-xs"></ul></div></div><input type="text" id="new-agent-role" placeholder="Role Name" class="input input-sm input-bordered w-full" /><textarea id="new-agent-prompt" placeholder="System Prompt" class="textarea textarea-sm textarea-bordered w-full h-28"></textarea><div class="flex gap-2"><select id="new-agent-provider" class="select select-sm select-bordered flex-1"></select><select id="new-agent-color" class="select select-sm select-bordered flex-1"><option value="primary">Blue</option><option value="secondary">Pink</option><option value="accent">Teal</option><option value="success">Green</option></select><button type="button" onclick="addNewAgent()" class="btn btn-sm btn-primary">Add</button></div></div><div class="modal-action"><button type="button" class="btn" onclick="agent_modal.close()">Done</button></div></div></dialog>
    <dialog id="project_modal" class="modal"><div class="modal-box"><h3 class="font-bold text-lg" data-i18n="create-project-title">Create New Project</h3><form id="project-form" hx-post="/api/projects" hx-target="#projects-list" hx-swap="beforeend" class="mt-4 space-y-4" onsubmit="project_modal.close()"><div class="form-control"><label class="label"><span class="label-text font-bold" data-i18n="project-name-label">Name</span></label><input type="text" name="name" class="input input-bordered w-full" required /></div><div class="form-control"><label class="label"><span class="label-text font-bold" data-i18n="root-path-label">Root Path</span></label><input type="text" name="rootPath" class="input input-bordered w-full" required /></div><div class="modal-action"><button type="button" class="btn" onclick="project_modal.close()">Cancel</button><button type="submit" class="btn btn-primary" data-i18n="create-project-btn">Create</button></div></form></div></dialog>
    <dialog id="memory_modal" class="modal"><div class="modal-box"><h3 class="font-bold text-lg" data-i18n="save-to-memory-title">Save Memory</h3><form id="memory-form" hx-post="/api/memories" hx-swap="none" class="mt-4 space-y-4" onsubmit="memory_modal.close()"><div class="form-control"><label class="label"><span class="label-text font-bold" data-i18n="memory-tags-label">Tags</span></label><input type="text" name="tags" id="memory-tags" class="input input-bordered w-full" required /></div><div class="form-control"><label class="label"><span class="label-text font-bold" data-i18n="content-label">Content</span></label><textarea name="content" id="memory-content" class="textarea textarea-bordered w-full h-24" required></textarea></div><div class="modal-action"><button type="button" class="btn" onclick="memory_modal.close()">Cancel</button><button type="submit" class="btn btn-primary" data-i18n="save-memory-btn">Save</button></div></form></div></dialog>
    <dialog id="prompt_viewer_modal" class="modal"><div class="modal-box w-11/12 max-w-3xl"><h3 class="font-bold text-lg" id="prompt-viewer-title">Agent Prompt</h3><div class="mt-4"><pre id="prompt-viewer-content" class="p-4 bg-base-300 rounded-lg whitespace-pre-wrap break-words text-sm font-mono max-h-96 overflow-y-auto"></pre></div><div class="modal-action"><button type="button" class="btn" onclick="prompt_viewer_modal.close()">Close</button></div></div></dialog>
</div>
