<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Manager</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen">
    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Photo Manager</h1>
            <div class="card bg-base-100 shadow-xl p-4">
                <form hx-post="/upload" hx-encoding="multipart/form-data" hx-target="#photo-grid" hx-swap="afterbegin" class="flex gap-2">
                    <input type="file" name="file" class="file-input file-input-bordered w-full max-w-xs" required />
                    <button type="submit" class="btn btn-primary">Upload</button>
                </form>
            </div>
        </header>

        <div id="photo-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6" hx-get="/photos" hx-trigger="load">
            <!-- Photos will be loaded here -->
        </div>
    </div>
</body>
</html>
