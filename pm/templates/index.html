<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Photo Manager</title>
    <script src="/pm/static/js/htmx.min.js"></script>
    <link href="/pm/static/css/daisyui.min.css" rel="stylesheet" />
    <script src="/pm/static/js/tailwind-cdn.js"></script>
    <style>
        .photo-card { transition: opacity 0.2s, transform 0.15s; }
        .photo-card:active { opacity: 0.75; transform: scale(0.97); }
        .drag-over { border-color: oklch(var(--p)) !important; background-color: oklch(var(--p) / 0.08) !important; }
        #preview-img { min-height: 120px; }
        .click-hint { pointer-events: none; }
        #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-item { pointer-events: auto; min-width: 200px; max-width: 340px; animation: slideIn 0.25s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-base-200 min-h-screen">

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Navbar -->
<div class="navbar bg-base-100 shadow-md sticky top-0 z-30 px-4">
    <div class="flex-1">
        <span class="text-lg font-bold">📷 Photo Manager</span>
    </div>
    <div class="flex-none gap-2">
        <span id="photo-count" class="text-sm text-base-content/50 hidden sm:inline">{% if initial_count %}{{ initial_count }} 张照片{% endif %}</span>
        <button class="btn btn-primary btn-sm gap-1"
                onclick="document.getElementById('upload-modal').showModal()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            上传
        </button>
    </div>
</div>

<!-- Upload Modal -->
<dialog id="upload-modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">上传照片</h3>

        <div id="drop-zone"
             class="border-2 border-dashed border-base-300 rounded-2xl p-8 text-center cursor-pointer
                    hover:border-primary hover:bg-primary/5 transition-all duration-200 mb-4"
             onclick="document.getElementById('file-input').click()">
            <div class="text-5xl mb-3">🖼️</div>
            <p class="font-semibold text-base-content/80">拖放图片到这里</p>
            <p class="text-sm text-base-content/50 mt-1">或点击选择 · JPG / PNG / GIF / WebP · 最大 50MB</p>
            <input type="file" id="file-input" multiple accept="image/*" class="hidden" />
        </div>

        <!-- Upload progress -->
        <div id="upload-progress" class="hidden space-y-2 mb-4">
            <div class="flex items-center gap-2 text-sm">
                <span class="loading loading-spinner loading-xs"></span>
                <span id="upload-status">上传中…</span>
            </div>
            <progress id="upload-bar" class="progress progress-primary w-full" value="0" max="100"></progress>
        </div>

        <div class="modal-action">
            <form method="dialog">
                <button class="btn">关闭</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Main content -->
<main class="container mx-auto p-3 sm:p-6 max-w-7xl">

    <!-- Stats (mobile visible) -->
    <div class="flex items-center justify-between mb-4">
        <span id="photo-count-mobile" class="text-sm text-base-content/50 sm:hidden">{% if initial_count %}{{ initial_count }} 张照片{% endif %}</span>
        <span class="text-sm text-base-content/40 sm:hidden">点击图片预览</span>
    </div>

    <!-- Photo Grid -->
    <div id="photo-grid"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-2 sm:gap-3">
        {{ initial_cards | safe }}
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-24 text-base-content/40">
        <div class="text-6xl mb-4">📂</div>
        <p class="text-lg">还没有照片</p>
        <p class="text-sm mt-1">点击「上传」添加第一张照片</p>
    </div>
</main>

<!-- Preview Modal -->
<dialog id="preview-modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box max-w-3xl p-0 overflow-hidden rounded-2xl bg-neutral text-neutral-content">
        <!-- Image area -->
        <div class="relative flex items-center justify-center bg-black" style="min-height:240px;max-height:70svh">
            <img id="preview-img" src="" alt=""
                 class="max-w-full object-contain"
                 style="max-height:70svh" />
            <!-- Close -->
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2
                               bg-black/50 hover:bg-black/80 text-white border-0 text-base z-10">✕</button>
            </form>
            <!-- Prev / Next -->
            <button id="prev-btn" onclick="navigatePreview(-1)"
                    class="btn btn-circle btn-ghost absolute left-2 top-1/2 -translate-y-1/2
                           bg-black/40 hover:bg-black/70 text-white border-0 text-2xl z-10">‹</button>
            <button id="next-btn" onclick="navigatePreview(1)"
                    class="btn btn-circle btn-ghost absolute right-2 top-1/2 -translate-y-1/2
                           bg-black/40 hover:bg-black/70 text-white border-0 text-2xl z-10">›</button>
            <!-- Loading indicator -->
            <div id="preview-loading" class="absolute inset-0 flex items-center justify-center bg-black/60 hidden">
                <span class="loading loading-spinner loading-lg text-white"></span>
            </div>
        </div>
        <!-- Info bar -->
        <div class="px-4 py-3 flex items-center justify-between bg-neutral">
            <div class="min-w-0 flex-1 mr-3">
                <p id="preview-title" class="font-semibold truncate text-sm"></p>
                <p id="preview-date" class="text-xs opacity-50 mt-0.5"></p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <button id="preview-info-btn" onclick="toggleDetailPanel()"
                        class="btn btn-xs btn-outline text-neutral-content border-neutral-content/30 hover:bg-white/10"
                        title="详细信息">ℹ 详情</button>
                <a id="preview-download" href="#"
                   class="btn btn-xs btn-outline text-neutral-content border-neutral-content/30 hover:bg-white/10">
                    ⬇ 下载
                </a>
                <button id="preview-delete-btn" class="btn btn-xs btn-error">🗑</button>
            </div>
        </div>
        <!-- Detail panel -->
        <div id="detail-panel" class="hidden px-4 pb-4 bg-neutral border-t border-white/10">
            <div id="detail-loading" class="py-3 text-center text-xs opacity-50 hidden">
                <span class="loading loading-spinner loading-xs"></span> 加载中…
            </div>
            <table id="detail-table" class="w-full text-xs mt-3 hidden">
                <tbody>
                    <tr class="border-b border-white/10">
                        <td class="py-1.5 pr-4 opacity-50 whitespace-nowrap">文件名</td>
                        <td id="detail-filename" class="py-1.5 break-all"></td>
                    </tr>
                    <tr class="border-b border-white/10">
                        <td class="py-1.5 pr-4 opacity-50 whitespace-nowrap">上传时间</td>
                        <td id="detail-uploaded" class="py-1.5"></td>
                    </tr>
                    <tr class="border-b border-white/10">
                        <td class="py-1.5 pr-4 opacity-50 whitespace-nowrap">文件大小</td>
                        <td id="detail-size" class="py-1.5"></td>
                    </tr>
                    <tr class="border-b border-white/10">
                        <td class="py-1.5 pr-4 opacity-50 whitespace-nowrap">分辨率</td>
                        <td id="detail-resolution" class="py-1.5"></td>
                    </tr>
                    <tr>
                        <td class="py-1.5 pr-4 opacity-50 whitespace-nowrap">格式</td>
                        <td id="detail-format" class="py-1.5"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
// ─── Toast ───────────────────────────────────────────────
function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    const alertClass = type === 'success' ? 'alert-success' : type === 'warning' ? 'alert-warning' : 'alert-error';
    const icon = type === 'success' ? '✓' : type === 'warning' ? '⚠' : '✕';
    const el = document.createElement('div');
    el.className = `toast-item alert ${alertClass} shadow-lg text-sm`;
    el.innerHTML = `<span>${icon}</span><span>${message}</span>`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}

// ─── State ───────────────────────────────────────────────
let currentPhotoId = null;
let photoIds = [];

const MAX_UPLOAD_SIZE = 50 * 1024 * 1024;

// ─── Upload drag & drop ──────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) uploadFiles(files);
});
fileInput.addEventListener('change', () => {
    if (fileInput.files.length) uploadFiles([...fileInput.files]);
});

async function uploadFiles(files) {
    const oversized = files.filter(f => f.size > MAX_UPLOAD_SIZE);
    if (oversized.length) {
        oversized.forEach(f => showToast(`${f.name} — ファイルサイズが50MBを超えています`, 'warning'));
        files = files.filter(f => f.size <= MAX_UPLOAD_SIZE);
        if (!files.length) return;
    }

    const progress = document.getElementById('upload-progress');
    const statusEl = document.getElementById('upload-status');
    const bar = document.getElementById('upload-bar');
    progress.classList.remove('hidden');

    let successCount = 0;
    let failCount = 0;
    for (let i = 0; i < files.length; i++) {
        statusEl.textContent = `上传 ${i + 1}/${files.length}: ${files[i].name}`;
        bar.value = Math.round((i / files.length) * 100);

        const fd = new FormData();
        fd.append('file', files[i]);
        try {
            const res = await fetch('/pm/upload', { method: 'POST', body: fd });
            if (res.ok) {
                const htmlSnippet = await res.text();
                const grid = document.getElementById('photo-grid');
                grid.insertAdjacentHTML('afterbegin', htmlSnippet);
                successCount++;
                refreshPhotoIds();
                updateCount();
                document.getElementById('empty-state').classList.add('hidden');
            } else {
                failCount++;
                let msg = `${files[i].name} のアップロードに失敗しました`;
                try { const j = await res.json(); msg = j.detail || msg; } catch {}
                showToast(msg, 'error');
            }
        } catch (err) {
            failCount++;
            showToast(`${files[i].name} — ネットワークエラー`, 'error');
        }
    }

    bar.value = 100;
    if (failCount === 0) {
        statusEl.textContent = `完成！上传了 ${successCount} 张照片。`;
    } else {
        statusEl.textContent = `完成：${successCount} 成功，${failCount} 失败`;
    }
    setTimeout(() => {
        progress.classList.add('hidden');
        bar.value = 0;
        fileInput.value = '';
        if (failCount === 0) {
            document.getElementById('upload-modal').close();
        }
    }, 1800);
}

// ─── Grid helpers ────────────────────────────────────────
function refreshPhotoIds() {
    photoIds = [...document.querySelectorAll('#photo-grid [data-photo-id]')]
        .map(el => parseInt(el.dataset.photoId));
}

function updateCount() {
    const n = photoIds.length;
    const text = n === 0 ? '' : `${n} 张照片`;
    const el1 = document.getElementById('photo-count');
    const el2 = document.getElementById('photo-count-mobile');
    if (el1) el1.textContent = text;
    if (el2) el2.textContent = text;
}

function checkEmpty() {
    const empty = document.getElementById('empty-state');
    empty.classList.toggle('hidden', photoIds.length > 0);
}

// ─── Preview modal ───────────────────────────────────────
function openPreview(el) {
    currentPhotoId = parseInt(el.dataset.photoId);
    refreshPhotoIds();
    showPreview(currentPhotoId);
    document.getElementById('preview-modal').showModal();
}

function showPreview(id) {
    currentPhotoId = id;
    if (detailPanelOpen) loadDetailPanel(id);
    const el = document.querySelector(`[data-photo-id="${id}"]`);
    if (!el) return;

    const img = document.getElementById('preview-img');
    const loading = document.getElementById('preview-loading');

    img.style.display = 'none';
    loading.classList.remove('hidden');

    const newSrc = `/pm/download/${id}`;
    img.onload = () => {
        loading.classList.add('hidden');
        img.style.display = '';
    };
    img.onerror = () => {
        loading.classList.add('hidden');
        img.style.display = '';
        showToast('画像の読み込みに失敗しました', 'error');
    };
    img.src = newSrc;

    document.getElementById('preview-title').textContent = el.dataset.photoTitle || '';
    document.getElementById('preview-date').textContent = el.dataset.photoDate || '';
    document.getElementById('preview-download').href = `/pm/download/${id}`;
    document.getElementById('preview-download').download = el.dataset.photoTitle || `photo_${id}`;

    const idx = photoIds.indexOf(id);
    document.getElementById('prev-btn').style.visibility = idx <= 0 ? 'hidden' : '';
    document.getElementById('next-btn').style.visibility = idx >= photoIds.length - 1 ? 'hidden' : '';
}

function navigatePreview(delta) {
    const idx = photoIds.indexOf(currentPhotoId);
    const nextIdx = idx + delta;
    if (nextIdx < 0 || nextIdx >= photoIds.length) return;
    showPreview(photoIds[nextIdx]);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
    const modal = document.getElementById('preview-modal');
    if (!modal.open) return;
    if (e.key === 'ArrowLeft') navigatePreview(-1);
    if (e.key === 'ArrowRight') navigatePreview(1);
    if (e.key === 'Escape') { modal.close(); detailPanelOpen = false; document.getElementById('detail-panel').classList.add('hidden'); }
});

// Delete from preview
document.getElementById('preview-delete-btn').addEventListener('click', async () => {
    if (!currentPhotoId || !confirm('确认删除这张照片？')) return;
    try {
        const res = await fetch(`/pm/delete/${currentPhotoId}`, { method: 'DELETE' });
        if (res.ok) {
            document.getElementById('preview-modal').close();
            const card = document.querySelector(`[data-photo-id="${currentPhotoId}"]`);
            if (card) card.remove();
            refreshPhotoIds();
            updateCount();
            checkEmpty();
            showToast('削除しました', 'success');
        } else {
            showToast('削除に失敗しました', 'error');
        }
    } catch (err) {
        showToast('ネットワークエラー', 'error');
    }
});

// ─── Photo detail panel ──────────────────────────────────
function formatFileSize(bytes) {
    if (bytes == null) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

let detailPanelOpen = false;
let detailCache = {};

async function toggleDetailPanel() {
    const panel = document.getElementById('detail-panel');
    detailPanelOpen = !detailPanelOpen;
    panel.classList.toggle('hidden', !detailPanelOpen);
    if (detailPanelOpen && currentPhotoId) {
        await loadDetailPanel(currentPhotoId);
    }
}

async function loadDetailPanel(id) {
    if (detailCache[id]) {
        renderDetailPanel(detailCache[id]);
        return;
    }
    const loading = document.getElementById('detail-loading');
    const table = document.getElementById('detail-table');
    loading.classList.remove('hidden');
    table.classList.add('hidden');
    try {
        const res = await fetch(`/pm/photo/${id}`);
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        detailCache[id] = data;
        renderDetailPanel(data);
    } catch (e) {
        showToast('详细信息加载失败', 'error');
    } finally {
        loading.classList.add('hidden');
    }
}

function renderDetailPanel(data) {
    document.getElementById('detail-filename').textContent = data.filename || '—';
    document.getElementById('detail-uploaded').textContent = data.uploaded_at || '—';
    document.getElementById('detail-size').textContent = formatFileSize(data.file_size);
    document.getElementById('detail-resolution').textContent =
        (data.width && data.height) ? `${data.width} × ${data.height} px` : '—';
    document.getElementById('detail-format').textContent = data.format || '—';
    document.getElementById('detail-table').classList.remove('hidden');
}

// ─── Initialize on page load ──────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    refreshPhotoIds();
    updateCount();
    checkEmpty();
});
</script>
</body>
</html>
