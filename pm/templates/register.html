<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - PhotoManager</title>
  <link rel="stylesheet" href="/pm/static/css/daisyui.min.css" />
  <script src="/pm/static/js/tailwind-cdn.js"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
  <div class="card w-full max-w-sm shadow-xl bg-base-100">
    <div class="card-body gap-4">
      <div class="text-center">
        <h1 class="text-2xl font-bold text-primary">📷 PhotoManager</h1>
        <p class="text-sm text-base-content/60 mt-1">创建新账户</p>
      </div>

      {% if error %}
      <div class="alert alert-error text-sm py-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/api/auth/register" class="flex flex-col gap-3">
        <label class="form-control">
          <div class="label pb-1"><span class="label-text">用户名</span></div>
          <input type="text" name="username" placeholder="4-20个字符"
                 class="input input-bordered w-full" required autofocus
                 minlength="4" maxlength="20" />
        </label>
        <label class="form-control">
          <div class="label pb-1"><span class="label-text">密码</span></div>
          <input type="password" name="password" placeholder="至少8个字符"
                 class="input input-bordered w-full" required minlength="8" />
        </label>
        <label class="form-control">
          <div class="label pb-1"><span class="label-text">确认密码</span></div>
          <input type="password" name="confirm_password" placeholder="再次输入密码"
                 class="input input-bordered w-full" required minlength="8" />
        </label>
        <button type="submit" class="btn btn-primary w-full mt-2">注册</button>
      </form>

      <div class="divider text-xs">已有账户?</div>
      <a href="/login" class="btn btn-outline btn-sm w-full">返回登录</a>
    </div>
  </div>
</body>
</html>
